name: ci

# Local-first minute policy: routine checks run locally with `pnpm run check`.
# This workflow is manual-only so private-repo development does not consume
# GitHub-hosted Actions minutes on every push or pull request.

on:
  workflow_dispatch:
    inputs:
      release_artifacts:
        description: "Also run npm package artifact validation"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack (pinned pnpm)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Quality gate (format, lint, typecheck, test)
        run: pnpm run check
      - name: Release artifact validation
        if: inputs.release_artifacts == 'true'
        run: pnpm run release:verify

  # Capture + grounding tests need a browser; run only when those packages change.
  capture-matrix:
    name: capture-matrix
    runs-on: ubuntu-latest
    if: inputs.release_artifacts == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install + browsers
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Capture + grounding tests
        run: pnpm --filter "@zigrivers/surface-grounding" test
