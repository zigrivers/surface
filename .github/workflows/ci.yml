name: ci

# Mirror principle (dev-setup.md): CI runs the SAME gate developers run locally —
# `pnpm run check` (format-check + lint + typecheck + test). If it passes locally, it passes here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack (pinned pnpm)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Quality gate (format, lint, typecheck, test)
        run: pnpm run check

  # Capture + grounding tests need a browser; run only when those packages change.
  capture-matrix:
    name: capture-matrix
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Detect capture/grounding changes
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base"...HEAD | grep -qE '^packages/(capture|grounding)/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Enable Corepack
        if: steps.changed.outputs.run == 'true'
        run: corepack enable
      - uses: actions/setup-node@v4
        if: steps.changed.outputs.run == 'true'
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install + browsers
        if: steps.changed.outputs.run == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @surface/capture exec playwright install --with-deps chromium
      - name: Capture + grounding tests
        if: steps.changed.outputs.run == 'true'
        run: pnpm --filter "@surface/capture" --filter "@surface/grounding" test
